name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Build executable
        run: python -m PyInstaller --onefile --windowed --icon=icon.ico --add-data "icon.ico;." --name="tmpbuild" main.py

      - name: Rename to Chinese
        run: |
          python -c "
          import os, glob, shutil
          dist = 'dist'
          files = glob.glob(os.path.join(dist, '*.exe'))
          print('Found exe files:', files)
          if not files:
              raise Exception('No exe found in dist/')
          src = files[0]
          dst = os.path.join(dist, '程序翻译器.exe')
          if os.path.exists(dst):
              os.remove(dst)
          shutil.move(src, dst)
          print('Renamed to:', dst)
          print('Final contents of dist/:', os.listdir(dist))
          "

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/程序翻译器.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
