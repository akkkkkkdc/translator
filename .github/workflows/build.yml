name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Build executable
        run: |
          if exist dist rmdir /s /q dist
          mkdir dist
          python -m PyInstaller --onefile --windowed --icon=icon.ico --add-data "icon.ico;." main.py
          echo === dist contents before rename ===
          dir dist

      - name: Rename to Chinese
        run: python -c "import os, glob, shutil, sys; files=glob.glob('dist/*.exe'); print('Found:', files); [shutil.move(f, 'dist/程序翻译器.exe') for f in files]; print('Final:', os.listdir('dist'))"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/程序翻译器.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
